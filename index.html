<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Quién se queda con la Copa?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;700;800&display=swap');

  :root {
    --bg-deep: #05130a;
    --bg-1: #0b2417;
    --bg-2: #123b25;
    --gold: #e9c56b;
    --gold-2: #f7d97e;
    --arg-blue: #74acdf;
    --arg-blue-2: #b7dbf3;
    --arg-white: #ffffff;
    --esp-red: #c60b1e;
    --esp-gold: #ffc400;
    --text: #f5efe4;
    --muted: #a9c4b4;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(233,197,107,0.12), transparent 55%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-deep) 100%);
    background-attachment: fixed;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(90deg, transparent 0 78px, rgba(255,255,255,0.015) 78px 79px),
      repeating-linear-gradient(0deg, transparent 0 78px, rgba(255,255,255,0.015) 78px 79px);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    width: 100%;
    max-width: 540px;
    position: relative;
    z-index: 1;

  .halime-logo {
    display: block;
    width: 110px;
    height: 110px;
    margin: 0 auto 8px;
    object-fit: contain;
    filter: drop-shadow(0 4px 16px rgba(233,197,107,0.35));
  }

  .halime-footer-logo {
    display: block;
    width: 42px;
    height: 42px;
    margin: 0 auto 10px;
    border-radius: 50%;
    object-fit: cover;
    opacity: 0.85;
  }

  .halime-name {
    font-family: 'Anton', sans-serif;
    font-size: 14px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 4px;
  }

  .trophy {
    text-align: center;
    font-size: 34px;
    margin-bottom: 6px;
    filter: drop-shadow(0 4px 12px rgba(233,197,107,0.35));
  }

  .eyebrow {
    text-align: center;
    letter-spacing: 0.35em;
    font-size: 10.5px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 800;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    height: 1px;
    width: 30px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .eyebrow::after { background: linear-gradient(90deg, var(--gold), transparent); }

  h1 {
    font-family: 'Anton', sans-serif;
    font-size: clamp(42px, 10vw, 64px);
    text-align: center;
    letter-spacing: 0.01em;
    margin: 0 0 8px;
    line-height: 0.95;
    text-transform: uppercase;
    background: linear-gradient(180deg, #ffffff 20%, var(--gold-2) 60%, var(--gold) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 4px 30px rgba(233,197,107,0.15);
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    margin: 0 0 32px;
    letter-spacing: 0.02em;
  }

  .matchup {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 28px;
  }

  .team-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .team-slot .team-name {
    font-family: 'Anton', sans-serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--text);
    text-transform: uppercase;
  }

  .flag {
    width: 72px;
    height: 50px;
    border-radius: 6px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);

  .flag.arg {
    background: linear-gradient(to bottom, var(--arg-blue) 0 33%, var(--arg-white) 33% 66%, var(--arg-blue) 66% 100%);
    position: relative;
  }
  .flag.arg::after {
    content: '\2600';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px;
    color: #f6b73c;
    line-height: 1;
  }

  .flag.esp {
    background: linear-gradient(to bottom, var(--esp-red) 0 25%, var(--esp-gold) 25% 75%, var(--esp-red) 75% 100%);
  }

  .vs {
    font-family: 'Anton', sans-serif;
    font-size: 24px;
    color: var(--gold);
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border: 1px solid rgba(233,197,107,0.35);
    border-radius: 999px;
    background: rgba(233,197,107,0.06);
    align-self: center;
    margin-bottom: 26px;
  }

  .name-field { margin-bottom: 20px; }

  .name-field label {
    display: block;
    font-family: 'Anton', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--gold);
    margin-bottom: 10px;
    text-align: center;
  }

  .name-field input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    text-align: center;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .name-field input:focus { outline: none; border-color: var(--gold); background: rgba(233,197,107,0.06); }
  .name-field input:disabled { opacity: 0.7; }

  .predictor {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 22px;
    padding: 24px 14px;
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    border: 1px solid rgba(233,197,107,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 12px 30px rgba(0,0,0,0.35);
  }

  .score-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    flex: 1;
  }

  .score-col .team-label {
    font-family: 'Anton', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
  }
  .score-col.arg .team-label { color: var(--arg-blue-2); }
  .score-col.esp .team-label { color: var(--esp-gold); }

  .stepper {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stepper button {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: var(--text);
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    line-height: 1;
    transition: background 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
  }
  .stepper button:hover:not(:disabled) { background: rgba(233,197,107,0.2); border-color: var(--gold); }
  .stepper button:active:not(:disabled) { transform: scale(0.9); }
  .stepper button:disabled { opacity: 0.35; cursor: default; }

  .score-num {
    font-family: 'Anton', sans-serif;
    font-size: 56px;
    min-width: 50px;
    text-align: center;
    line-height: 1;
  }
  .score-col.arg .score-num { color: var(--arg-blue-2); }
  .score-col.esp .score-num { color: var(--esp-gold); }

  .dash {
    font-family: 'Anton', sans-serif;
    font-size: 42px;
    color: var(--gold);
    align-self: center;
    margin-top: 26px;
    opacity: 0.6;
  }

  .penalty-box {
    margin: -8px 0 22px;
    padding: 18px;
    border-radius: 14px;
    background: rgba(233,197,107,0.08);
    border: 1px dashed rgba(233,197,107,0.45);
  }

  .penalty-label {
    text-align: center;
    font-size: 13px;
    color: var(--gold);
    font-weight: 700;
    margin: 0 0 12px;
  }

  .penalty-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .pen-btn {
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 12px 8px;
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 13.5px;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.1s ease;
  }
  .pen-btn:hover:not(:disabled) { transform: translateY(-1px); }
  .pen-btn.arg.selected { border-color: var(--arg-blue); background: rgba(116,172,223,0.18); }
  .pen-btn.esp.selected { border-color: var(--esp-red); background: rgba(198,11,30,0.18); }
  .pen-btn:disabled { cursor: default; opacity: 0.6; }

  .submit-btn {
    display: block;
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 18px;
    background: linear-gradient(90deg, var(--gold), var(--gold-2), var(--gold));
    color: #0b1e12;
    font-family: 'Anton', sans-serif;
    font-size: 18px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 26px;
    box-shadow: 0 8px 24px rgba(233,197,107,0.35), inset 0 1px 0 rgba(255,255,255,0.4);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(233,197,107,0.5), inset 0 1px 0 rgba(255,255,255,0.4); }
  .submit-btn:disabled { opacity: 0.6; cursor: default; }

  .my-pick {
    text-align: center;
    font-size: 14px;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 22px;
    padding: 18px;
    border-radius: 12px;
    background: rgba(233,197,107,0.08);
    border: 1px solid rgba(233,197,107,0.25);
  }
  .my-pick .score-badge {
    display: block;
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    letter-spacing: 0.04em;
    color: var(--text);
    margin-top: 6px;
    text-transform: uppercase;
  }

  .leaderboard { margin-bottom: 6px; }

  .lb-title {
    font-family: 'Anton', sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin: 0 0 14px;
    text-align: center;
  }

  .lb-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .lb-score {
    font-family: 'Anton', sans-serif;
    font-size: 20px;
    min-width: 62px;
    text-align: right;
    color: var(--text);
  }
  .lb-row.mine .lb-score { color: var(--gold); }

  .lb-bar-wrap {
    flex: 1;
    height: 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .lb-bar {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--arg-blue), var(--gold), var(--esp-red));
    transition: width 0.6s ease;
    box-shadow: 0 0 12px rgba(233,197,107,0.35);
  }

  .lb-pct {
    font-size: 12.5px;
    color: var(--muted);
    min-width: 38px;
    font-weight: 700;
  }

  .vote-count {
    text-align: center;
    color: var(--muted);
    font-size: 12.5px;
    margin-top: 14px;
  }

  .footer {
    margin-top: 32px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
    border-top: 1px solid rgba(233,197,107,0.15);
    padding-top: 18px;
    letter-spacing: 0.03em;
  }
  .footer b { color: var(--gold); font-family: 'Anton', sans-serif; font-size: 14px; letter-spacing: 0.08em; }

  .loading { text-align: center; color: var(--muted); font-size: 13px; }

  .admin-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }

  .admin-panel {
    background: var(--bg-1);
    border: 1px solid rgba(233,197,107,0.3);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 420px;
  }

  .admin-panel h2 {
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    letter-spacing: 0.05em;
    color: var(--gold);
    margin: 0 0 14px;
    text-align: center;
    text-transform: uppercase;
  }

  .admin-panel input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    margin-bottom: 12px;
  }

  .row-btn {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 12px;
    background: var(--gold);
    color: #0b1e12;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 14px;
  }

  .admin-close {
    display: block;
    margin: 0 auto 14px;
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 12px;
  }

  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 14px;
    top: -20px;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
    animation: confetti-fall linear forwards;
    border-radius: 2px;
  }

  @keyframes confetti-fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0.9; transform: translateY(110vh) rotate(720deg); }
  }
</style>
</head>

<div class="card">
  <img src="halime-logo.png" alt="Halime Estética Médica" class="halime-logo" />
  <div class="halime-name">Halime</div>
  <div class="trophy">🏆</div>
  <div class="eyebrow">Final · Mundial 2026</div>
  <h1>¿Cómo termina la final?</h1>
  <p class="subtitle">Predecí el resultado exacto y participá del sorteo de Halime</p>

  <div class="matchup">
    <div class="team-slot">
      <div class="flag arg"></div>
      <span class="team-name">Argentina</span>
    </div>
    <span class="vs">VS</span>
    <div class="team-slot">
      <div class="flag esp"></div>
      <span class="team-name">España</span>
    </div>
  </div>

  <div id="app">
    <p class="loading">Cargando votos...</p>
  </div>

  <div id="diff-root"></div>

  <div class="footer">
    <div><b>Domingo 19 de julio · 16:00 hs (ARG)</b></div>
    <div>MetLife Stadium, East Rutherford</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jrardafurwqzyvpcoqdu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_usYkBm5afi4z8DYiX3f31Q_fR7WtzdH';
const TABLE = 'predicciones';
const MY_ENTRY_KEY = 'mundial2026-my-entry-supabase';
const POLL_MS = 5000;

let draft = { arg: 0, esp: 0 };
let penWinner = null;
let nameInput = '';
let cachedEntries = [];

function sbHeaders(extra) {
  return Object.assign({
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
  }, extra || {});
}

async function fetchEntries() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=created_at.asc`, {
      headers: sbHeaders(),
    });
    if (!res.ok) throw new Error('fetch failed');
    return await res.json();
  } catch (e) {
    console.error('Error al leer predicciones', e);
    return null;
  }
}

async function nameExists(name) {
  const normalized = name.trim();
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=id&name=eq.${encodeURIComponent(normalized)}`, {
      headers: sbHeaders(),
    });
    if (!res.ok) return false;
    const data = await res.json();
    return data.length > 0;
  } catch (e) {
    return false;
  }
}

async function insertEntry(entry) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
      method: 'POST',
      headers: sbHeaders({ 'Prefer': 'return=representation' }),
      body: JSON.stringify({ name: entry.name, arg: entry.arg, esp: entry.esp, pen: entry.pen }),
    });
    if (!res.ok) throw new Error('insert failed');
    const data = await res.json();
    return data[0];
  } catch (e) {
    console.error('Error al guardar la predicción', e);
    return null;
  }
}

async function getMyEntry() {
  try {
    const res = await window.storage.get(MY_ENTRY_KEY, false);
    return res ? JSON.parse(res.value) : null;
  } catch (e) {
    return null;
  }
}

async function setMyEntry(entry) {
  try {
    await window.storage.set(MY_ENTRY_KEY, JSON.stringify(entry), false);
  } catch (e) {
    console.error('No se pudo guardar tu elección localmente', e);
  }
}

function scoreLabel(e) {
  const base = `${e.arg}–${e.esp}`;
  return e.pen ? `${base} (pen. ${e.pen === 'arg' ? 'Arg' : 'Esp'})` : base;
}

function isDraw() {
  return draft.arg === draft.esp;
}

function renderPredictor(myEntry) {
  const app = document.getElementById('app');
  const locked = !!myEntry;

  const penaltyHtml = (locked ? myEntry.pen !== null && myEntry.pen !== undefined : isDraw()) ? `
    <div class="penalty-box">
      <p class="penalty-label">Empate en los 90' — ¿quién gana por penales?</p>
      <div class="penalty-options">
        <button class="pen-btn arg ${(locked ? myEntry.pen : penWinner) === 'arg' ? 'selected' : ''}" id="pen-arg" ${locked ? 'disabled' : ''}>Argentina</button>
        <button class="pen-btn esp ${(locked ? myEntry.pen : penWinner) === 'esp' ? 'selected' : ''}" id="pen-esp" ${locked ? 'disabled' : ''}>España</button>
      </div>
    </div>
  ` : '';

  app.innerHTML = `
    <div class="name-field">
      <label>Nombre y apellido</label>
      <input type="text" id="name-input" placeholder="Ej: Nico Fernández" maxlength="60" value="${locked ? myEntry.name : nameInput}" ${locked ? 'disabled' : ''} />
    </div>
    <div class="predictor">
      <div class="score-col arg">
        <span class="team-label">Argentina</span>
        <div class="stepper">
          <button id="arg-minus" ${locked ? 'disabled' : ''}>−</button>
          <span class="score-num" id="arg-num">${draft.arg}</span>
          <button id="arg-plus" ${locked ? 'disabled' : ''}>+</button>
        </div>
      </div>
      <span class="dash">–</span>
      <div class="score-col esp">
        <span class="team-label">España</span>
        <div class="stepper">
          <button id="esp-minus" ${locked ? 'disabled' : ''}>−</button>
          <span class="score-num" id="esp-num">${draft.esp}</span>
          <button id="esp-plus" ${locked ? 'disabled' : ''}>+</button>
        </div>
      </div>
    </div>
    ${penaltyHtml}
    ${locked ? '' : '<button class="submit-btn" id="submit-btn">Confirmar predicción</button>'}
    ${locked ? `<p class="my-pick">Tu predicción: <span class="score-badge">Argentina ${myEntry.arg} – ${myEntry.esp} España${myEntry.pen ? ` (gana ${myEntry.pen === 'arg' ? 'Argentina' : 'España'} x penales)` : ''}</span></p>` : ''}
    <div class="leaderboard" id="leaderboard" style="display:none;"></div>
    <p class="vote-count" id="vote-count" style="display:none;"></p>
  `;

  if (!locked) {
    document.getElementById('name-input').oninput = (e) => { nameInput = e.target.value; };
    document.getElementById('arg-minus').onclick = () => { draft.arg = Math.max(0, draft.arg - 1); onScoreChange(myEntry); };
    document.getElementById('arg-plus').onclick = () => { draft.arg = Math.min(9, draft.arg + 1); onScoreChange(myEntry); };
    document.getElementById('esp-minus').onclick = () => { draft.esp = Math.max(0, draft.esp - 1); onScoreChange(myEntry); };
    document.getElementById('esp-plus').onclick = () => { draft.esp = Math.min(9, draft.esp + 1); onScoreChange(myEntry); };
    document.getElementById('submit-btn').onclick = handleSubmit;
    const penArgBtn = document.getElementById('pen-arg');
    const penEspBtn = document.getElementById('pen-esp');
    if (penArgBtn) penArgBtn.onclick = () => { penWinner = 'arg'; renderPredictor(myEntry); };
    if (penEspBtn) penEspBtn.onclick = () => { penWinner = 'esp'; renderPredictor(myEntry); };
  }
}

function onScoreChange(myEntry) {
  if (!isDraw()) penWinner = null;
  renderPredictor(myEntry);
}

function renderLeaderboard(entries, myEntry) {
  const total = entries.length;
  const countEl = document.getElementById('vote-count');
  if (!countEl) return;
  if (!total) {
    countEl.textContent = 'Todavía nadie predijo un resultado. ¡Sé el primero!';
    return;
  }
  countEl.textContent = `${total} predicción${total === 1 ? '' : 'es'} en total`;
}

function askForDifferentiator(baseName) {
  return new Promise((resolve) => {
    const root = document.getElementById('diff-root');
    root.innerHTML = `
      <div class="admin-overlay" id="diff-overlay">
        <div class="admin-panel">
          <h2>¡Ya hay un/a ${escapeHtml(baseName)}!</h2>
          <p class="penalty-label" style="text-align:left;">Alguien ya se anotó con ese nombre y apellido. Agregá un número para diferenciarte (ej: los últimos 3 dígitos de tu teléfono, o tu DNI).</p>
          <input type="text" id="diff-input" inputmode="numeric" placeholder="Ej: 123" maxlength="10" />
          <button class="row-btn" id="diff-confirm">Confirmar</button>
          <button class="admin-close" id="diff-cancel">Cancelar</button>
        </div>
      </div>
    `;
    const cleanup = (val) => { root.innerHTML = ''; resolve(val); };
    document.getElementById('diff-confirm').onclick = () => {
      const val = document.getElementById('diff-input').value.trim();
      if (!val) { alert('Escribí al menos un número.'); return; }
      cleanup(val);
    };
    document.getElementById('diff-cancel').onclick = () => cleanup(null);
    document.getElementById('diff-overlay').addEventListener('click', (ev) => {
      if (ev.target.id === 'diff-overlay') cleanup(null);
    });
  });
}

async function handleSubmit() {
  const rawName = (nameInput || '').trim().replace(/\s+/g, ' ');
  const words = rawName.split(' ').filter(Boolean);
  if (words.length < 2) {
    alert('Poné tu nombre y apellido para poder participar.');
    return;
  }
  if (isDraw() && !penWinner) {
    alert('Elegí quién gana por penales.');
    return;
  }

  const submitBtn = document.getElementById('submit-btn');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Guardando...'; }

  let finalName = rawName;
  while (await nameExists(finalName)) {
    const diff = await askForDifferentiator(rawName);
    if (diff === null) {
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Confirmar predicción'; }
      return;
    }
    finalName = `${rawName} (${diff})`;
  }

  const inserted = await insertEntry({
    name: finalName,
    arg: draft.arg,
    esp: draft.esp,
    pen: isDraw() ? penWinner : null,
  });

  if (!inserted) {
    alert('Hubo un problema guardando tu predicción. Probá de nuevo en un momento.');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Confirmar predicción'; }
    return;
  }

  await setMyEntry(inserted);
  cachedEntries = await fetchEntries() || cachedEntries;
  renderPredictor(inserted);
  renderLeaderboard(cachedEntries, inserted);

  // Confeti según a quién le da ganar (o empate)
  const winsArg = inserted.arg > inserted.esp || (inserted.arg === inserted.esp && inserted.pen === 'arg');
  const winsEsp = inserted.esp > inserted.arg || (inserted.arg === inserted.esp && inserted.pen === 'esp');
  if (winsArg) {
    launchConfetti(['#74acdf', '#ffffff', '#f6b73c']); // celeste, blanco, sol
  } else if (winsEsp) {
    launchConfetti(['#c60b1e', '#ffc400']); // rojo y amarillo
  } else {
    launchConfetti(['#e9c56b', '#ffffff']); // fallback dorado
  }
}

function launchConfetti(colors) {
  const total = 90;
  for (let i = 0; i < total; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    const duration = 2.5 + Math.random() * 2;
    const delay = Math.random() * 0.6;
    piece.style.animationDuration = duration + 's';
    piece.style.animationDelay = delay + 's';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (10 + Math.random() * 8) + 'px';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), (duration + delay) * 1000 + 200);
  }
}

async function refreshLoop() {
  const entries = await fetchEntries();
  if (entries) {
    cachedEntries = entries;
    const myEntry = await getMyEntry();
    renderLeaderboard(cachedEntries, myEntry);
  }
  setTimeout(refreshLoop, POLL_MS);
}

async function init() {
  const [entries, myEntry] = await Promise.all([fetchEntries(), getMyEntry()]);
  cachedEntries = entries || [];
  if (myEntry) {
    draft = { arg: myEntry.arg, esp: myEntry.esp };
    penWinner = myEntry.pen;
  }
  renderPredictor(myEntry);
  renderLeaderboard(cachedEntries, myEntry);
  setTimeout(refreshLoop, POLL_MS);
}


function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

init();
</script>
